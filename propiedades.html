<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Propiedades | Marlen Guzmán</title>
    <link rel="icon" type="image/jpeg" href="Logo_MG.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- CSS de Leaflet (Mapa Gratuito) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        /* Modal Custom para el Mapa */
        #customMapModal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }

        .custom-map-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: mapFadeIn 0.3s;
        }

        .custom-map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #bfa378;
            padding-bottom: 10px;
        }

        .custom-map-title {
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.5rem;
            color: #333;
            margin: 0;
        }

        .custom-map-close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        .custom-map-close:hover {
            color: #333;
        }

        @keyframes mapFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estilos para el popup del mapa */
        .map-popup-card {
            text-align: center;
            font-family: 'Inter', sans-serif;
            min-width: 150px;
        }

        .map-popup-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .map-popup-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #333;
        }

        .map-popup-price {
            color: #bfa378;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .map-popup-btn {
            display: inline-block;
            background: #bfa378;
            color: white !important;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
        }

        .map-popup-btn:hover {
            background: #a38960;
        }

        body {
            padding-top: 80px;
            background-color: #f8f9fa;
        }

        /* Barra de Filtros Lateral */
        .sidebar-filters {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 100px;
            /* Se queda fija al bajar */
        }

        .filter-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 2px solid #bfa378;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .btn-filter {
            width: 100%;
            background-color: #bfa378;
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-filter:hover {
            background-color: #a38960;
        }

        /* Tarjeta de Propiedad */
        .property-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            margin-bottom: 30px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card-img-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .property-card:hover .card-img-wrapper img {
            transform: scale(1.05);
        }

        /* Etiquetas sobre la imagen */
        .badge-status {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 5px 12px;
            border-radius: 4px;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 2;
        }

        .bg-venta {
            background-color: #bfa378;
        }

        .bg-arriendo {
            background-color: #2c3e50;
        }

        .badge-code {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            line-height: 1.4;
        }

        .card-location {
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-price {
            color: #bfa378;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .card-price small {
            color: #999;
            font-size: 0.8rem;
            font-weight: 400;
            margin-left: 5px;
        }

        .card-features {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
            margin-top: auto;
            font-size: 0.85rem;
            color: #555;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-detail {
            display: block;
            width: 100%;
            text-align: center;
            border: 1px solid #bfa378;
            color: #bfa378;
            text-decoration: none;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-detail:hover {
            background-color: #bfa378;
            color: white;
        }

        /* Responsive Layout */
        .catalog-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .catalog-grid {
                grid-template-columns: 1fr;
            }

            .sidebar-filters {
                position: static;
                margin-bottom: 30px;
            }
        }
    </style>
</head>

<body data-page="propiedades">

    <div id="nav-placeholder"></div>

    <section class="section" style="padding-top: 40px;">
        <div class="container">

            <div class="catalog-grid">

                <aside>
                    <!-- INICIO BARRA DE FILTROS AVANZADOS -->
                    <div class="sidebar-filters">
                        <div class="filter-title">
                            <i class="fas fa-sliders-h me-2"></i> Búsqueda Avanzada
                        </div>
                        <form id="advanced-filter-form">

                            <!-- 1. Operación -->
                            <div class="form-group mb-3">
                                <label for="adv-operacion">Tipo de Operación</label>
                                <select id="adv-operacion" class="form-control">
                                    <option value="">Todas las operaciones</option>
                                    <option value="venta">Venta</option>
                                    <option value="arriendo">Arriendo</option>
                                    <option value="temporal">Arriendo Temporal</option>
                                    <option value="nuevos">Proyectos Nuevos</option>
                                </select>
                            </div>

                            <!-- 2. Tipo de Propiedad -->
                            <div class="form-group mb-3">
                                <label for="adv-tipo">Tipo de Propiedad</label>
                                <select id="adv-tipo" class="form-control">
                                    <option value="">Todos los tipos</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Departamento">Departamento</option>
                                    <option value="Parcela">Parcela</option>
                                    <option value="Terreno">Terreno</option>
                                    <option value="Local Comercial">Local Comercial</option>
                                    <option value="Oficina">Oficina</option>
                                    <option value="Bodega">Bodega</option>
                                </select>
                            </div>

                            <!-- 3. Ubicación -->
                            <div class="form-group mb-3">
                                <label>Ubicación</label>
                                <input type="text" id="adv-region" class="form-control mb-2" placeholder="Región...">
                                <input type="text" id="adv-comuna" class="form-control mb-2" placeholder="Comuna...">
                                <input type="text" id="adv-sector" class="form-control mb-2" placeholder="Sector...">

                                <!-- Botón para abrir el Mapa Interactivo -->
                                <button type="button" class="btn btn-outline-secondary w-100 btn-sm mt-1"
                                    style="font-size: 0.8rem;" onclick="abrirMapaInteractivo()">
                                    <i class="fas fa-map-marked-alt"></i> Ver en Mapa Interactivo
                                </button>
                            </div>

                            <!-- 4. Rango de Precios -->
                            <div class="form-group mb-3">
                                <label>Rango de Precio</label>
                                <div class="d-flex gap-2">
                                    <input type="number" id="adv-precio-desde" class="form-control" placeholder="Desde">
                                    <input type="number" id="adv-precio-hasta" class="form-control" placeholder="Hasta">
                                </div>
                            </div>

                            <!-- 5 y 6. Dormitorios y Baños -->
                            <div class="row mb-4">
                                <div class="col-6">
                                    <div class="form-group">
                                        <label for="adv-dorm">Dormitorios</label>
                                        <select id="adv-dorm" class="form-control">
                                            <option value="0">Todos</option>
                                            <option value="1">1 o más</option>
                                            <option value="2">2 o más</option>
                                            <option value="3">3 o más</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-group">
                                        <label for="adv-banos">Baños</label>
                                        <select id="adv-banos" class="form-control">
                                            <option value="0">Todos</option>
                                            <option value="1">1 o más</option>
                                            <option value="2">2 o más</option>
                                            <option value="3">3 o más</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Botones de Acción -->
                            <div class="d-grid gap-2">
                                <button type="button" class="btn-filter" onclick="aplicarFiltrosAvanzados()">
                                    <i class="fas fa-search"></i> APLICAR FILTROS
                                </button>
                                <button type="button" class="btn btn-light border w-100"
                                    style="padding: 10px; font-weight: 600;" onclick="limpiarFiltrosAvanzados()">
                                    <i class="fas fa-eraser"></i> LIMPIAR
                                </button>
                            </div>
                        </form>
                    </div>
                    <!-- FIN BARRA DE FILTROS AVANZADOS -->
                </aside>

                <main>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="section-title mb-0" style="font-size: 1.8rem;" id="page-title">Todas las
                                Propiedades</h2>
                            <span class="text-muted small"><strong id="total-props">0</strong> propiedades
                                encontradas</span>
                        </div>

                        <!-- SELECTOR DE ITEMS POR PÁGINA -->
                        <div class="d-flex align-items-center">
                            <label for="items-per-page" class="me-2 small fw-bold text-muted">Mostrar:</label>
                            <select id="items-per-page" class="form-select form-select-sm" style="width: auto;"
                                onchange="cambiarItemsPorPagina()">
                                <option value="6">6</option>
                                <option value="9">9</option>
                                <option value="12">12</option>
                                <option value="15">15</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                    </div>

                    <div id="loading-spinner" class="text-center py-5" style="display: none;">
                        <i class="fas fa-circle-notch fa-spin fa-3x text-muted"></i>
                        <p class="mt-3 text-muted">Buscando las mejores opciones...</p>
                    </div>

                    <div id="properties-grid" class="row">
                    </div>

                    <!-- CONTENEDOR DE PAGINACIÓN DINÁMICA -->
                    <div id="pagination-controls" class="text-center mt-5">
                        <!-- Aquí se inyectan los botones vía JS -->
                    </div>
                </main>

            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <!-- Modal Custom del Mapa Interactivo -->
    <div id="customMapModal">
        <div class="custom-map-content">
            <div class="custom-map-header">
                <h5 class="custom-map-title">Mapa de Propiedades</h5>
                <button type="button" class="custom-map-close" onclick="cerrarMapaInteractivo()">&times;</button>
            </div>
            <div style="position: relative; padding: 0;">
                <!-- Overlay de Carga -->
                <div id="map-loading-overlay"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; display: none;">
                    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #bfa378;"></i>
                    <p class="mt-3 fw-bold" style="color: #555; text-align: center;">Ubicando propiedades en el mapa...
                        <br><small style="font-weight: normal;" id="map-progress-text"></small></p>
                </div>
                <!-- Contenedor del Mapa -->
                <div id="interactive-map" style="width: 100%; height: 500px; border-radius: 4px; z-index: 1;"></div>
            </div>
            <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span class="text-muted small" style="font-size: 0.85rem;"><i class="fas fa-info-circle"></i> Mostrando
                    propiedades de la página actual.</span>
                <button type="button" class="btn btn-secondary"
                    style="padding: 8px 16px; background: #6c757d; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: 'Inter', sans-serif;"
                    onclick="cerrarMapaInteractivo()">Cerrar Mapa</button>
            </div>
        </div>
    </div>

    <!-- JS de Leaflet (Mapa Gratuito) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="cargador.js"></script>
    <script type="module" src="script.js"></script>

    <script>
        // --- LÓGICA DEL CATÁLOGO ---
        let allProperties = [];
        let filteredProperties = [];
        let currentPage = 1;
        let itemsPerPage = 6;

        document.addEventListener('DOMContentLoaded', () => {
            // 1. LEER PARÁMETROS DE LA URL (Vienen del Home)
            const urlParams = new URLSearchParams(window.location.search);

            const opParam = urlParams.get('op');
            const tipoParam = urlParams.get('tipo');
            const ubicacionParam = urlParams.get('ubicacion');

            // 2. PRE-LLENAR LOS INPUTS DEL FILTRO LATERAL
            // Esto es vital para que el usuario vea qué está filtrando

            if (opParam) {
                // decodificamos por si acaso
                const opSelect = document.getElementById('adv-operacion');
                if (opSelect) {
                    opSelect.value = decodeURIComponent(opParam);
                }

                // Actualizar título de la página
                const titulos = {
                    'venta': 'Propiedades en Venta',
                    'arriendo': 'Propiedades en Arriendo',
                    'temporal': 'Arriendo Temporal'
                };
                if (titulos[opParam]) {
                    document.getElementById('page-title').innerText = titulos[opParam];
                }
            }

            if (tipoParam) {
                // Selecciona "Casa", "Departamento", etc.
                const tipoSelect = document.getElementById('adv-tipo');
                if (tipoSelect) {
                    tipoSelect.value = decodeURIComponent(tipoParam);
                }
            }

            if (ubicacionParam) {
                // Escribe "Los Andes" en el campo de texto del filtro
                const comunaInput = document.getElementById('adv-comuna');
                if (comunaInput) {
                    comunaInput.value = decodeURIComponent(ubicacionParam);
                }
            }

            // 3. CARGAR DATOS
            // Al terminar de cargar, la función fetchPropiedades llamará a aplicarFiltrosAvanzados()
            // Como ya llenamos los inputs arriba con los datos de la URL, el filtro funcionará automático.
            fetchPropiedades();
        });

        async function fetchPropiedades() {
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('properties-grid').innerHTML = '';

            try {
                // LLAMADA A TU API
                const res = await fetch('/api/propiedades-list?limit=500'); // Traemos más para paginar en cliente
                const json = await res.json();

                if (json.success) {
                    allProperties = json.data;
                    aplicarFiltrosAvanzados();
                } else {
                    console.error("Error API:", json.message);
                }
            } catch (error) {
                console.error("Error conexión:", error);
                document.getElementById('properties-grid').innerHTML = '<div class="col-12 text-center py-5">Error cargando propiedades. Verifique conexión.</div>';
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        function aplicarFiltrosAvanzados() {
            // 1. Capturar todos los valores del formulario HTML
            const op = document.getElementById('adv-operacion').value;
            const tipo = document.getElementById('adv-tipo').value;

            const region = document.getElementById('adv-region').value.toLowerCase().trim();
            const comuna = document.getElementById('adv-comuna').value.toLowerCase().trim();
            const sector = document.getElementById('adv-sector').value.toLowerCase().trim();

            const precioDesde = parseFloat(document.getElementById('adv-precio-desde').value);
            const precioHasta = parseFloat(document.getElementById('adv-precio-hasta').value);

            const dorms = parseInt(document.getElementById('adv-dorm').value) || 0;
            const banos = parseInt(document.getElementById('adv-banos').value) || 0;

            // 2. Filtrar el listado principal de la API
            filteredProperties = allProperties.filter(p => {
                // --- A. Tipo de Operación ---
                if (op === 'venta' && !p.operacion_venta) return false;
                if (op === 'arriendo' && !p.operacion_arriendo) return false;
                if (op === 'temporal' && !p.operacion_arriendo_temporal) return false;
                if (op === 'nuevos' && !p.es_proyecto_nuevo) return false; // Por si en el futuro existe este flag

                // --- B. Tipo de Propiedad ---
                if (tipo && (!p.tipo_propiedad || p.tipo_propiedad.toLowerCase() !== tipo.toLowerCase())) return false;

                // --- C. Ubicación ---
                if (region && (!p.region || !p.region.toLowerCase().includes(region))) return false;
                if (comuna && (!p.comuna || !p.comuna.toLowerCase().includes(comuna))) return false;
                if (sector && (!p.sector || !p.sector.toLowerCase().includes(sector))) return false;

                // --- D. Rango de Precios ---
                let precioPropiedad = 0;
                // Asignamos el precio dependiendo de si la propiedad es de venta o arriendo
                if (p.operacion_venta) {
                    precioPropiedad = parseFloat(p.precio_venta || 0);
                } else if (p.operacion_arriendo || p.operacion_arriendo_temporal) {
                    precioPropiedad = parseFloat(p.precio_arriendo || 0);
                }

                if (!isNaN(precioDesde) && precioPropiedad < precioDesde) return false;
                if (!isNaN(precioHasta) && precioPropiedad > precioHasta) return false;

                // --- E. Dormitorios y Baños (>=) ---
                // Si eligen "3 o más" evalúa si la propiedad tiene menos de 3 (para descartarla)
                if (dorms > 0 && (!p.dormitorios || parseInt(p.dormitorios) < dorms)) return false;
                if (banos > 0 && (!p.banos || parseInt(p.banos) < banos)) return false;

                return true;
            });

            // 3. Ordenar (más recientes primero) y contar
            filteredProperties.sort((a, b) => b.id - a.id);
            document.getElementById('total-props').innerText = filteredProperties.length;

            // 4. Volver a la página 1 y renderizar
            currentPage = 1;
            renderPaginated();
        }

        // Función adicional solicitada para limpiar todos los filtros a su estado original
        function limpiarFiltrosAvanzados() {
            document.getElementById('advanced-filter-form').reset();
            aplicarFiltrosAvanzados();
        }


        function cambiarItemsPorPagina() {
            const select = document.getElementById('items-per-page');
            itemsPerPage = parseInt(select.value);
            currentPage = 1; // Volver a la primera página
            renderPaginated();
        }

        function renderPaginated() {
            const grid = document.getElementById('properties-grid');
            grid.innerHTML = '';

            if (filteredProperties.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5"><h3>No encontramos propiedades</h3><p>Prueba con otros criterios de búsqueda.</p></div>';
                document.getElementById('pagination-controls').style.display = 'none';
                return;
            }

            // Calcular índices
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageItems = filteredProperties.slice(startIndex, endIndex);

            // Renderizar items
            renderizarPropiedades(pageItems);

            // Renderizar controles de paginación
            renderPaginationControls();
        }

        function renderPaginationControls() {
            const container = document.getElementById('pagination-controls');
            container.style.display = 'block';

            const totalPages = Math.ceil(filteredProperties.length / itemsPerPage);
            let html = '';

            // Botón Anterior
            html += `<button class="btn btn-outline-secondary btn-sm me-2" 
                     onclick="cambiarPagina(${currentPage - 1})" 
                     ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>`;

            // Números de página
            // Mostramos un rango limitado para no saturar si hay muchas páginas
            const maxPagesToShow = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxPagesToShow / 2));
            let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);

            if (endPage - startPage + 1 < maxPagesToShow) {
                startPage = Math.max(1, endPage - maxPagesToShow + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="btn btn-outline-secondary btn-sm ${i === currentPage ? 'active' : ''}" 
                         onclick="cambiarPagina(${i})">${i}</button>`;
            }

            // Botón Siguiente
            html += `<button class="btn btn-outline-secondary btn-sm ms-2" 
                     onclick="cambiarPagina(${currentPage + 1})" 
                     ${currentPage === totalPages ? 'disabled' : ''}>Siguiente</button>`;

            container.innerHTML = html;
        }

        function cambiarPagina(pageNum) {
            const totalPages = Math.ceil(filteredProperties.length / itemsPerPage);
            if (pageNum < 1 || pageNum > totalPages) return;

            currentPage = pageNum;
            renderPaginated();
            // Scroll suave hacia arriba para ver los nuevos resultados
            document.querySelector('main').scrollIntoView({ behavior: 'smooth' });
        }

        function renderizarPropiedades(lista) {
            const grid = document.getElementById('properties-grid');
            // Nota: grid.innerHTML = '' ya se hace en renderPaginated

            lista.forEach(p => {
                // Lógica Precio y Conversión Dinámica
                let precioDisplay = '';
                let precioAproxDisplay = '';
                let badgeHtml = '';
                const ufActual = window.obtenerValorUFActual ? window.obtenerValorUFActual() : 38000;

                if (p.operacion_venta) {
                    const valor = parseFloat(p.precio_venta);
                    precioDisplay = `${p.moneda_venta} ${new Intl.NumberFormat('es-CL').format(valor)}`;
                    if (p.moneda_venta === 'UF') {
                        precioAproxDisplay = `$${new Intl.NumberFormat('es-CL').format(Math.round(valor * ufActual))} aprox.`;
                    } else {
                        precioAproxDisplay = `UF ${new Intl.NumberFormat('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(valor / ufActual)} aprox.`;
                    }
                    badgeHtml = `<span class="badge-status bg-venta">VENTA</span>`;
                } else if (p.operacion_arriendo) {
                    const valor = parseFloat(p.precio_arriendo);
                    precioDisplay = `${p.moneda_arriendo} ${new Intl.NumberFormat('es-CL').format(valor)}`;
                    if (p.moneda_arriendo === 'UF') {
                        precioAproxDisplay = `$${new Intl.NumberFormat('es-CL').format(Math.round(valor * ufActual))} aprox.`;
                    } else {
                        precioAproxDisplay = `UF ${new Intl.NumberFormat('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(valor / ufActual)} aprox.`;
                    }
                    badgeHtml = `<span class="badge-status bg-arriendo">ARRIENDO</span>`;
                }

                // Imagen por defecto y manejo de ruta relativa vs absoluta
                let imgUrl = p.imagen_principal || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=600&q=80';

                // Si la imagen viene de uploads/ y no tiene slash inicial, agregarlo
                if (imgUrl.startsWith('uploads/')) {
                    imgUrl = '/' + imgUrl;
                }

                // Construcción de la Tarjeta
                const html = `
                <div class="col-md-6 col-lg-4 animate-up">
                    <div class="property-card">
                        <div class="card-img-wrapper">
                            ${badgeHtml}
                            <span class="badge-code">COD: ${p.id}</span>
                            <img src="${imgUrl}" alt="${p.tipo_propiedad}" loading="lazy">
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${p.tipo_propiedad} en ${p.comuna}</h5>
                            <p class="card-location"><i class="fas fa-map-marker-alt"></i> ${p.sector || p.comuna}</p>
                            
                            <div class="card-price">${precioDisplay} <br><small style="font-size: 0.75rem; color: #999; font-weight: normal;">${precioAproxDisplay}</small></div>
                            
                            <div class="card-features">
                                <div class="feature-item"><i class="fas fa-bed"></i> ${p.dormitorios || 0}</div>
                                <div class="feature-item"><i class="fas fa-bath"></i> ${p.banos || 0}</div>
                                <div class="feature-item"><i class="fas fa-ruler-combined"></i> ${p.superficie_util || 0} m²</div>
                            </div>

                            <a href="web-ficha.html?id=${p.id}" class="btn-detail">VER DETALLES</a>
                        </div>
                    </div>
                </div>
                `;
                grid.innerHTML += html;
            });
        }

        // --- LÓGICA DEL MAPA INTERACTIVO (LEAFLET + NOMINATIM) ---
        let map = null;
        let markersGroup = null;
        let geocodeCache = {}; // Cache para no repetir búsquedas

        async function geocodeAddress(property) {
            // Construimos una dirección, priorizando Calle, Comuna, Chile
            let busquedaEspecifica = "";
            if (property.direccion_calle) {
                busquedaEspecifica = `${property.direccion_calle}, ${property.comuna}, Chile`;
            } else {
                busquedaEspecifica = `${property.comuna}, Chile`; // Si no tiene calle, buscamos la comuna
            }

            if (geocodeCache[busquedaEspecifica]) return geocodeCache[busquedaEspecifica];

            try {
                // Buscamos coordenadas gratis en OpenStreetMap
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(busquedaEspecifica)}&limit=1`;
                const response = await fetch(url);
                const data = await response.json();

                if (data && data.length > 0) {
                    const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                    // Pequeña dispersión para que pines en la misma calle/comuna no se oculten uno debajo de otro
                    coords[0] += (Math.random() - 0.5) * 0.001;
                    coords[1] += (Math.random() - 0.5) * 0.001;

                    geocodeCache[busquedaEspecifica] = coords;
                    return coords;
                } else if (property.direccion_calle) {
                    // Si falla la calle entera, intentamos solo con la Comuna como respaldo
                    const urlComuna = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(property.comuna + ', Chile')}&limit=1`;
                    const resComuna = await fetch(urlComuna);
                    const dataComuna = await resComuna.json();

                    if (dataComuna && dataComuna.length > 0) {
                        const coords = [parseFloat(dataComuna[0].lat), parseFloat(dataComuna[0].lon)];
                        coords[0] += (Math.random() - 0.5) * 0.005;
                        coords[1] += (Math.random() - 0.5) * 0.005;
                        geocodeCache[busquedaEspecifica] = coords;
                        return coords;
                    }
                }
            } catch (error) {
                console.error("Error al obtener coordenadas", error);
            }
            return null;
        }

        function cerrarMapaInteractivo() {
            document.getElementById('customMapModal').style.display = 'none';
        }

        async function abrirMapaInteractivo() {
            // 1. Mostrar el Modal Custom
            const mapModal = document.getElementById('customMapModal');
            mapModal.style.display = 'flex';

            // 2. Inicializar el mapa si no existe
            if (!map) {
                map = L.map('interactive-map').setView([-33.4489, -70.6693], 10); // Centro por defecto (Chile)

                // Capa de mapa de OpenStreetMap (100% Gratis)
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                markersGroup = L.featureGroup().addTo(map);
            } else {
                // Forzar re-renderizado cuando se abre el modal
                setTimeout(() => map.invalidateSize(), 300);
            }

            markersGroup.clearLayers(); // Limpiar marcadores viejos

            // 3. Obtener propiedades DE LA PÁGINA ACTUAL (Evita saturar la API)
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const propertiesToMap = filteredProperties.slice(startIndex, endIndex);

            if (propertiesToMap.length === 0) return;

            // 4. Mostrar pantalla de carga
            const overlay = document.getElementById('map-loading-overlay');
            const progressText = document.getElementById('map-progress-text');
            overlay.style.display = 'flex';

            let bounds = [];

            // 5. Ubicar uno a uno (con pequeñita pausa para respetar el límite del servidor gratuito)
            for (let i = 0; i < propertiesToMap.length; i++) {
                const p = propertiesToMap[i];
                progressText.innerText = `Ubicando: ${i + 1} de ${propertiesToMap.length}...`;

                const coords = await geocodeAddress(p);

                if (coords) {
                    bounds.push(coords);

                    let imgUrl = p.imagen_principal || 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=600&q=80';
                    if (imgUrl.startsWith('uploads/')) imgUrl = '/' + imgUrl;

                    let precioDisplay = p.operacion_venta ?
                        `${p.moneda_venta} ${new Intl.NumberFormat('es-CL').format(p.precio_venta)}` :
                        `${p.moneda_arriendo} ${new Intl.NumberFormat('es-CL').format(p.precio_arriendo)}`;

                    const popupContent = `
                        <div class="map-popup-card">
                            <img src="${imgUrl}" alt="Propiedad">
                            <div class="map-popup-title">${p.tipo_propiedad} en ${p.comuna}</div>
                            <div class="map-popup-price">${precioDisplay}</div>
                            <a href="web-ficha.html?id=${p.id}" class="map-popup-btn">Ver Detalles</a>
                        </div>
                    `;

                    // Icono dorado bonito
                    const goldIcon = new L.Icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    L.marker(coords, { icon: goldIcon }).bindPopup(popupContent).addTo(markersGroup);
                }

                // Pausa cortita (300ms) para no sobrecargar OpenStreetMap gratis
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            overlay.style.display = 'none';

            // 6. Centrar cámara en los pines
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [40, 40] });
            }
        }
    </script>
